name: functional

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

env:
  APP_PORT: 8010

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap .env from example
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Run migrations
        run: docker compose run --rm app alembic upgrade head

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ env.APP_PORT }}/healthz > /dev/null 2>&1; then
              echo "App is healthy"
              break
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done
          curl -sf http://localhost:${{ env.APP_PORT }}/healthz || (echo "App failed to start" && exit 1)

      - name: Install acceptance test deps
        run: pip install httpx pytest

      - name: Run acceptance tests
        run: API_BASE_URL="http://localhost:${{ env.APP_PORT }}" python -m pytest verify/acceptance -v
        env:
          API_BASE_URL: "http://localhost:${{ env.APP_PORT }}"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs app --tail=100

      - name: Teardown
        if: always()
        run: docker compose down --volumes --remove-orphans
