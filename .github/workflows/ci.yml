# CI — unit tests + build
# Runs on PRs and pushes to main. Starts a Postgres service, runs
# white-box tests, and verifies the Docker image builds.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: twitter_x
          POSTGRES_PASSWORD: twitter_x
          POSTGRES_DB: twitter_x_test
        options: >-
          --health-cmd "pg_isready -U twitter_x"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://twitter_x:twitter_x@localhost:5432/twitter_x_test
        run: python -m pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t twitter-x .
