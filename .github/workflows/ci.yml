name: ci

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: twitter_x
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pip install "redis>=5.0"
      - run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/twitter_x"
      - run: pytest tests/ -q
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/twitter_x"
      - run: docker build -t twitter-x .
