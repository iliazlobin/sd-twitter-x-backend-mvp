name: lint

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.20
      - run: ruff check src/ tests/ verify/
      - run: ruff format --check src/ tests/ verify/
