# Lint check — ruff
# Runs on PRs and pushes to main. Fast (<30s).

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.20

      - name: ruff check
        run: ruff check src/ tests/ verify/

      - name: ruff format
        run: ruff format --check src/ tests/ verify/
