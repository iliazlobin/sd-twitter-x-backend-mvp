services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: twitter_x
      POSTGRES_PASSWORD: twitter_x
      POSTGRES_DB: twitter_x
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitter_x"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      # Override the host port via APP_PORT env var to avoid collisions.
      # Default 8040 — safe default for Twitter/X MVP.
      - "${APP_PORT:-8040}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://twitter_x:twitter_x@db:5432/twitter_x
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
